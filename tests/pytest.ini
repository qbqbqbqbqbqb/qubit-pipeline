[pytest]
pythonpath = src
asyncio_mode = auto
addopts = -v --strict-markers
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning:tests.qubit.models.conftest
    ignore::pytest.PytestUnknownMarkWarning:tests.qubit.memory.conftest
markers =
    asyncio: mark test as async
    integration: slow integration tests
    heavy: tests that require heavy mocking of ML/external services (torch, transformers, chromadb, twitchAPI, etc.)